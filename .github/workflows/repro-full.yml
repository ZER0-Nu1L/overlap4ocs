name: Repro Full (Manual)

on:
  workflow_dispatch:
    inputs:
      heartbeat_sec:
        description: "Heartbeat interval in seconds"
        required: false
        default: "30"
      generate_figures:
        description: "Generate figures/paper_reproduce after matrix runs"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: repro-full
  cancel-in-progress: false

jobs:
  repro-full:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    env:
      UV_CACHE_DIR: ${{ github.workspace }}/.uv-cache
      MPLBACKEND: Agg
      PYTHONPATH: .

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7

      - name: Install CBC solver
        run: |
          sudo apt-get update
          sudo apt-get install -y coinor-cbc

      - name: Install dependencies (locked)
        run: uv sync --frozen --extra notebook

      - name: Run full matrix suite
        run: |
          for matrix in \
            config/matrix/paper/exp1.1-hd+bruck-1.toml \
            config/matrix/paper/exp1.1-pair-1.toml \
            config/matrix/paper/exp1.1-hd+bruck-2.toml \
            config/matrix/paper/exp1.1-pair-2.toml \
            config/matrix/paper/exp1.2-hd+bruck.toml \
            config/matrix/paper/exp1.2-pair.toml \
            config/matrix/paper/exp1.3-ar_rb.toml \
            config/matrix/paper/exp1.3-a2a_pair.toml \
            config/matrix/paper/exp1.3-a2a_bruck.toml \
            config/matrix/paper/exp2.1-matrix_sweep_msg+k-B.toml \
            config/matrix/paper/exp2.2-matrix_sweep_msg+Tr.toml; do
            base="$(basename "$matrix" .toml)"
            PYTHONPATH=. uv run python scripts/matrix_runner.py \
              --matrix "$matrix" \
              --resume \
              --rerun-failed \
              --heartbeat-sec "${{ inputs.heartbeat_sec }}" \
              --progress-file "logs/repro/${base}_progress.json"
          done

      - name: Prepare merged CSVs
        run: uv run python scripts/prepare_simulation_data.py --target all

      - name: Generate paper figures (safe output dir)
        if: ${{ inputs.generate_figures }}
        run: uv run python scripts/simulation_fig.py --write-summary --output-dir figures/paper_reproduce

      - name: Upload full repro artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: repro-full-${{ github.run_id }}
          retention-days: 30
          path: |
            logs/repro/*.json
            logs/matrix_results-*.csv
            logs/results-*.csv
            figures/paper_reproduce/*.pdf
            figures/paper_reproduce/*.md
