matrix_id = "k2_p16_sweep_msg-stride4"
solver = "pulp"
solver_gap = 0.05
solver_time_limit = 120
program_config = "config/program.toml"

message_sizes_mib = [0.125, 0.5, 2.0, 8.0, 32.0, 128.0, 512.0]  # in MB
algorithms = ["ar_having-doubling", "a2a_pairwise", "a2a_bruck"]

[topology]
k = 2
p = 16
B = 50  # bytes/ms (50 GBps)
T_reconf = 0.2
T_lat = 0.02

[output]
config_dir  = "logs/generated_configs/k2_p16_sweep"
results_csv = "logs/matrix_results-k2_p16_sweep.csv"
